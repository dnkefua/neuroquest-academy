Führe dein Programm aus, indem du auf die Schaltfläche Start klickst. Wenn du mit deinem aktuellen Programm nicht zufrieden bist, kannst du die Ausführung jederzeit durch Klicken auf die Stopp-Schaltfläche unterbrechen. Dadurch wird der Roboter auf seine Ausgangsposition zurückgesetzt.`},objects:{title:"Spielobjekte",content:"Ein Level besteht aus grauen Feldern mit einer bestimmten Höhe. Im Level sind spezielle Leuchtfelder verteilt. Diese Leuchtfelder können entweder blau sein, was bedeutet, dass sie unbeleuchtet sind, oder gelb, was bedeutet, dass sie leuchten. Wenn zu irgendeinem Zeitpunkt alle Leuchtfelder in einem Level leuchten, hast du dieses Level abgeschlossen."},walkForward:{title:"Anweisung: vorwärts gehen",content:"Beim Vorwärtsgehen rückt der Roboter ein Feld in die Richtung vor, in die er gerade schaut. Diese Bewegung wird nur ausgeführt, wenn das Feld, in das er gehen würde, die gleiche Höhe hat wie das Feld, von dem er startet. In allen anderen Fällen wird die Bewegung nicht ausgeführt."},turnRight:{title:"Anweisung: 90 Grad nach rechts drehen",content:"Beim Drehen um 90 Grad nach rechts bleibt der Roboter an Ort und Stelle und dreht sich um 90 Grad (eine Vierteldrehung) nach rechts (im Uhrzeigersinn)."},turnLeft:{title:"Anweisung: 90 Grad nach links drehen",content:"Beim Drehen um 90 Grad nach links bleibt der Roboter an Ort und Stelle und dreht sich um 90 Grad (eine Vierteldrehung) nach links (gegen den Uhrzeigersinn)."},jump:{title:"Anweisung: Springen",content:"Springen ist eine Kombination aus einem Schritt nach vorn und einer Höhenänderung. Die Richtung der Bewegung entspricht der Richtung, in die der Roboter schaut. Ein Sprung nach oben ist nur erfolgreich, wenn das Zielfeld genau eine Stufe höher ist als das Startfeld. Ist der Höhenunterschied größer als eins, ist der Sprung nicht erfolgreich und es erfolgt keine Bewegung. Beim Herunterspringen gibt es keine Begrenzung für die Höhe, von der der Roboter herunterspringen kann. Die einzige Bedingung ist, dass der Höhenunterschied mindestens eins beträgt."},light:{title:"Anweisung: Licht",content:"Die Licht-Anweisung kann verwendet werden, um Leuchtfelder ein- oder auszuschalten. Befindet sich der Roboter auf einem unbeleuchteten Leuchtfeld, wenn die Licht-Anweisung ausgeführt wird, wird das Leuchtfeld eingeschaltet. Befindet sich der Roboter jedoch auf einem bereits leuchtenden Leuchtfeld, wird es ausgeschaltet. Befindet sich der Roboter auf einem normalen Feld, passiert nichts."},repeat:{title:"Anweisung: Wiederholen",content:"Die Wiederholungs-Anweisung ist eine spezielle Anweisung, mit der sich einige Anweisungen eine bestimmte Anzahl von Malen wiederholen lassen. Die Wiederholungs-Anweisung hat einen speziellen Rahmen, in den du Anweisungen aus der Anweisungsliste ablegen kannst. Außerdem hat sie einen Zähler, mit dem du festlegen kannst, wie oft die Anweisungen innerhalb der Wiederholung ausgeführt werden. Es ist sogar möglich, eine Wiederholungs-Anweisung innerhalb einer Wiederholungs-Anweisung zu platzieren, was entscheidend ist, um sehr kleine Programme zu erstellen."},medals:{title:"Medaillen",content:"Medaillen werden für das Abschließen von Levels mit einer sehr kleinen Anzahl von Anweisungen vergeben. Manchmal lassen diese kleinen Programme den Roboter viele nutzlose Anweisungen ausführen, was sehr ineffizient ist und viel Zeit kostet. Bitte beachte, dass in der Informatik das beste Programm nicht dasjenige ist, das die wenigsten Anweisungen enthält, sondern dasjenige, bei dem der Roboter die wenigsten Anweisungen ausführt."},video:{play:"abspielen"}},gameScreen:{back:"Zurück",toggleAudio:"Audio umschalten",clear:"Leeren",run:"Start",speed:"Geschwindigkeit:"},instructions:{title:"Anweisungen",walk:"Vorwärts gehen",turnRight:"90 Grad nach rechts drehen",turnLeft:"90 Grad nach links drehen",jump:"Springen",light:"Licht",repeat:{label:"Wiederholen",times:"mal"},placeholder:"Lege deine Anweisungen hier ab"},program:{title:"Programm"},dialogs:{levelComplete:{title:"Level abgeschlossen",message:"Glückwunsch! Du hast dieses Level mit {{count}} Anweisungen abgeschlossen!",bronzeMedalHint:"Schließe das Level mit {{count}} Anweisungen oder weniger ab, um eine Bronzemedaille zu erhalten.",silverMedalHint:"Schließe das Level mit {{count}} Anweisungen oder weniger ab, um eine Silbermedaille zu erhalten.",goldMedalHint:"Schließe das Level mit {{count}} Anweisungen oder weniger ab, um eine Goldmedaille zu erhalten."},achievement:{title:"Erfolg freigeschaltet!"}}},er={controls:{run:"Run",stop:"Stop"},welcomeScreen:{start:"Start Game",toggleAudio:"Toggle Audio",help:"Help",achievements:"Achievements",language:"Language"},levelSelectScreen:{title:"Level select",mainMenu:"Main Menu"},achievementsScreen:{title:"Achievements",mainMenu:"Main Menu"},achievements:{completeLevel:{title:"Finish Him",message:"Complete a level."},earnGoldMedal:{title:"Momma's Boy",message:"Earn a gold medal."},completeLevels5:{title:"Ambitious",message:"Complete 5 levels."},completeLevels10:{title:"Dedicated",message:"Complete 10 levels."},completeLevels15:{title:"Addicted",message:"Complete 15 levels."},completeLevelsBronze:{title:"Nerd",message:"Earn bronze medals on all levels."},completeLevelsSilver:{title:"Elite",message:"Earn silver medals on all levels."},completeLevelsGold:{title:"H4X0R",message:"Earn gold medals on all levels."}},helpScreen:{mainMenu:"Main Menu",goal:{title:"Goal of the game",content:"In order to complete the game, you have to tell the robot how to light up all the light tiles in a given level. However, your only way of interacting with the robot is by assembling instructions into a program that the robot can execute."},howTo:{title:"How to play the game",content:`You can create a program by dragging instructions from the instruction list and dropping them into the program frame. The instructions will automatically be added to the bottom of the highlighted block.
Execute your program by clicking the Run button. If you are not satisfied with your current program, you can interrupt the execution at any moment by clicking the Stop button. This will reset the robot to his initial position.`},objects:{title:"Game objects",content:"A level is made up from gray tiles which have a certain height. Special light tiles are scattered throughout the level. These light tiles can either be blue, which means that they are unlit, or they can be yellow, which means that they are lit. If at any given moment, all the light tiles in a level are lit, you have completed that level."},walkForward:{title:"Instruction: walk forward",content:"When walking forward, the robot will advance one square in the direction it is currently facing. This movement will only be performed if the space it would be heading into is of the same height as the square it is moving out from. In any other case the movement will not be performed."},turnRight:{title:"Instruction: Turn 90 degrees to the right",content:"When turning 90 degrees to the right, the robot will stay in place and turn 90 degrees (a quarter turn) to the right (clockwise)."},turnLeft:{title:"Instruction: Turn 90 degrees to the left",content:"When turning 90 degrees to the left, the robot will stay in place and turn 90 degrees (a quarter turn) to the left (anti-clockwise)."},jump:{title:"Instruction: Jump",content:"Jumping is a combination of a move forward and a change in height. The direction of the movement is in the direction that the robot is facing. An upward jump is only successful if the destination tile is higher by exactly one step than the starting tile. If the height difference is bigger than one, the jump is not successful and no movement is performed. When jumping down, there is no limit to the height the robot can jump down from. The only condition is that the difference in height is at least one."},light:{title:"Instruction: Light",content:"The light instruction can be used to toggle light tiles on or off. If the robot is located on an unlit light tile when the light instruction is executed, the light tile will be toggled on. However, if the robot is located on an already lit light tile, that light tile will be toggled off. When the robot is located on a normal tile, nothing happens."},repeat:{title:"Instruction: Repeat",content:"The repeat instruction is a special instruction that can be used to repeat some instructions a certain number of times. The repeat instruction has a special frame where you can drop instructions from the instruction list. It also has a counter where you can define the number of times the instructions within the repeat instruction will be repeated. It is even possible to place a repeat instruction within a repeat instruction, which is essential for creating very small programs."},medals:{title:"Medals",content:"Medals are rewarded for completing levels with only a very small amount of instructions. Sometimes, these small programs make the robot execute a lot of useless instructions, which is very inefficient and takes a lot of time. Please be aware that in computer science, the best program is not the one that contains the least amount of instructions but the one that has the robot execute the least amount of instructions."},video:{play:"play"}},gameScreen:{back:"Back",toggleAudio:"Toggle Audio",clear:"Clear",run:"Run",speed:"Speed:"},instructions:{title:"Instructions",walk:"Walk forward",turnRight:"Turn 90 degrees to the right",turnLeft:"Turn 90 degrees to the left",jump:"Jump",light:"Light",repeat:{label:"Repeat",times:"times"},placeholder:"Drop your instructions here"},program:{title:"Program"},dialogs:{levelComplete:{title:"Level complete",message:"Congratulations! You have completed this level using {{count}} instructions!",bronzeMedalHint:"Complete the level with {{count}} instructions or less to receive a bronze medal.",silverMedalHint:"Complete the level with {{count}} instructions or less to receive a silver medal.",goldMedalHint:"Complete the level with {{count}} instructions or less to receive a gold medal."},achievement:{title:"Achievement unlocked!"}}},tr={controls:{run:"Exécuter",stop:"Arrêter"},welcomeScreen:{start:"Démarrer le jeu",toggleAudio:"Activer/Désactiver l'audio",help:"Aide",achievements:"Succès",language:"Langue"},levelSelectScreen:{title:"Sélection du niveau",mainMenu:"Menu principal"},achievementsScreen:{title:"Succès",mainMenu:"Menu principal"},achievements:{completeLevel:{title:"Terminé",message:"Terminez un niveau."},earnGoldMedal:{title:"Fils à maman",message:"Gagnez une médaille d'or."},completeLevels5:{title:"Ambitieux",message:"Terminez 5 niveaux."},completeLevels10:{title:"Dévoué",message:"Terminez 10 niveaux."},completeLevels15:{title:"Accro",message:"Terminez 15 niveaux."},completeLevelsBronze:{title:"Nerd",message:"Obtenez des médailles de bronze sur tous les niveaux."},completeLevelsSilver:{title:"Élite",message:"Obtenez des médailles d'argent sur tous les niveaux."},completeLevelsGold:{title:"H4X0R",message:"Obtenez des médailles d'or sur tous les niveaux."}},helpScreen:{mainMenu:"Menu principal",goal:{title:"But du jeu",content:"Pour terminer le jeu, vous devez indiquer au robot comment allumer toutes les cases lumineuses d'un niveau. Cependant, votre seul moyen d'interagir avec le robot est d'assembler des instructions dans un programme que le robot peut exécuter."},howTo:{title:"Comment jouer",content:`Vous pouvez créer un programme en faisant glisser des instructions depuis la liste et en les déposant dans le cadre du programme. Les instructions seront automatiquement ajoutées en bas du bloc en surbrillance.
Exécutez votre programme en cliquant sur le bouton Exécuter. Si vous n'êtes pas satisfait de votre programme actuel, vous pouvez interrompre l'exécution à tout moment en cliquant sur le bouton Arrêter. Cela réinitialisera le robot à sa position initiale.`},objects:{title:"Objets du jeu",content:"Un niveau est composé de cases grises ayant une certaine hauteur. Des cases lumineuses spéciales sont dispersées dans le niveau. Ces cases lumineuses peuvent être bleues, ce qui signifie qu'elles sont éteintes, ou jaunes, ce qui signifie qu'elles sont allumées. Si, à un moment donné, toutes les cases lumineuses d'un niveau sont allumées, vous avez terminé ce niveau."},walkForward:{title:"Instruction : avancer",content:"En avançant, le robot se déplace d'une case dans la direction vers laquelle il est orienté. Ce mouvement ne sera effectué que si la case vers laquelle il se dirige est de la même hauteur que la case de départ. Dans tout autre cas, le mouvement ne sera pas effectué."},turnRight:{title:"Instruction : tourner à droite de 90 degrés",content:"En tournant de 90 degrés vers la droite, le robot reste sur place et pivote de 90 degrés (un quart de tour) vers la droite (dans le sens des aiguilles d'une montre)."},turnLeft:{title:"Instruction : tourner à gauche de 90 degrés",content:"En tournant de 90 degrés vers la gauche, le robot reste sur place et pivote de 90 degrés (un quart de tour) vers la gauche (dans le sens inverse des aiguilles d'une montre)."},jump:{title:"Instruction : sauter",content:"Le saut est une combinaison d'un déplacement vers l'avant et d'un changement de hauteur. La direction du mouvement est celle vers laquelle le robot est orienté. Un saut vers le haut ne réussit que si la case de destination est plus haute d'exactement une marche que la case de départ. Si la différence de hauteur est supérieure à un, le saut échoue et aucun mouvement n'est effectué. En sautant vers le bas, il n'y a pas de limite à la hauteur depuis laquelle le robot peut sauter. La seule condition est que la différence de hauteur soit d'au moins un."},light:{title:"Instruction : éclairer",content:"L'instruction lumière peut être utilisée pour allumer ou éteindre les cases lumineuses. Si le robot se trouve sur une case lumineuse éteinte lorsque l'instruction est exécutée, la case est allumée. En revanche, si le robot se trouve sur une case déjà allumée, elle est éteinte. Si le robot se trouve sur une case normale, rien ne se passe."},repeat:{title:"Instruction : répéter",content:"L'instruction répéter est une instruction spéciale qui permet de répéter certaines instructions un certain nombre de fois. L'instruction répéter dispose d'un cadre spécial dans lequel vous pouvez déposer des instructions depuis la liste. Elle possède également un compteur permettant de définir le nombre de répétitions. Il est même possible de placer une instruction répéter à l'intérieur d'une autre, ce qui est essentiel pour créer de très petits programmes."},medals:{title:"Médailles",content:"Les médailles sont attribuées lorsque vous terminez des niveaux avec un très petit nombre d'instructions. Parfois, ces petits programmes font exécuter au robot de nombreuses instructions inutiles, ce qui est très inefficace et prend beaucoup de temps. Veuillez noter qu'en informatique, le meilleur programme n'est pas celui qui contient le moins d'instructions, mais celui qui fait exécuter au robot le moins d'instructions."},video:{play:"lecture"}},gameScreen:{back:"Retour",toggleAudio:"Activer/Désactiver l'audio",clear:"Effacer",run:"Exécuter",speed:"Vitesse :"},instructions:{title:"Instructions",walk:"Avancer",turnRight:"Tourner à droite de 90 degrés",turnLeft:"Tourner à gauche de 90 degrés",jump:"Sauter",light:"Éclairer",repeat:{label:"Répéter",times:"fois"},placeholder:"Déposez vos instructions ici"},program:{title:"Programme"},dialogs:{levelComplete:{title:"Niveau terminé",message:"Félicitations ! Vous avez terminé ce niveau en utilisant {{count}} instructions !",bronzeMe             class="absolute bottom-2 left-2 flex flex-wrap items-center gap-2 p-2 rounded-box bg-base-100/80 backdrop-blur shadow">
            <button class="levelSelectButton btn btn-sm btn-square" data-i18n-title="gameScreen.back" title="Back">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="size-4 fill-current">
                <path d="M19 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H19v-2Z" />
              </svg>
            </button>
            <button class="audioToggleButton btn btn-sm btn-square" data-i18n-title="gameScreen.toggleAudio"
              title="Toggle audio">
              <svg class="lb-audio-on hidden size-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                fill="currentColor">
                <path
                  d="M10.5 3.75a.75.75 0 0 0-1.264-.546L5.203 7H2.667a.75.75 0 0 0-.7.48A6.985 6.985 0 0 0 1.5 10c0 .887.165 1.737.468 2.52.111.29.39.48.7.48h2.535l4.033 3.796a.75.75 0 0 0 1.264-.546V3.75ZM16.45 5.05a.75.75 0 0 0-1.06 1.061 5.5 5.5 0 0 1 0 7.778.75.75 0 0 0 1.06 1.06 7 7 0 0 0 0-9.899Z" />
                <path
                  d="M14.329 7.172a.75.75 0 0 0-1.061 1.06 2.5 2.5 0 0 1 0 3.536.75.75 0 0 0 1.06 1.06 4 4 0 0 0 0-5.656Z" />
              </svg>
              <svg class="lb-audio-off size-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                fill="currentColor">
                <path
                  d="M10.047 3.062a.75.75 0 0 1 .453.688v12.5a.75.75 0 0 1-1.264.546L5.203 13H2.667a.75.75 0 0 1-.7-.48A6.985 6.985 0 0 1 1.5 10c0-.887.165-1.737.468-2.52a.75.75 0 0 1 .7-.48h2.535l4.033-3.796a.75.75 0 0 1 .811-.142ZM13.78 7.22a.75.75 0 1 0-1.06 1.06L14.44 10l-1.72 1.72a.75.75 0 0 0 1.06 1.06l1.72-1.72 1.72 1.72a.75.75 0 1 0 1.06-1.06L16.56 10l1.72-1.72a.75.75 0 0 0-1.06-1.06L15.5 8.94l-1.72-1.72Z" />
              </svg>
            </button>
            <button id="clearButton" class="btn btn-sm btn-square" data-i18n-title="gameScreen.clear" title="Clear">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="size-4">
                <path fill-rule="evenodd"
                  d="M5 3.25V4H2.75a.75.75 0 0 0 0 1.5h.3l.815 8.15A1.5 1.5 0 0 0 5.357 15h5.285a1.5 1.5 0 0 0 1.493-1.35l.815-8.15h.3a.75.75 0 0 0 0-1.5H11v-.75A2.25 2.25 0 0 0 8.75 1h-1.5A2.25 2.25 0 0 0 5 3.25Zm2.25-.75a.75.75 0 0 0-.75.75V4h3v-.75a.75.75 0 0 0-.75-.75h-1.5ZM6.05 6a.75.75 0 0 1 .787.713l.275 5.5a.75.75 0 0 1-1.498.075l-.275-5.5A.75.75 0 0 1 6.05 6Zm3.9 0a.75.75 0 0 1 .712.787l-.275 5.5a.75.75 0 0 1-1.498-.075l.275-5.5a.75.75 0 0 1 .786-.711Z"
                  clip-rule="evenodd" />
              </svg>
            </button>
            <button id="runButton" class="btn btn-sm btn-primary btn-square" data-i18n-title="gameScreen.run"
              title="Run">
              <svg class="lb-run-icon size-4 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7-11-7Z" />
              </svg>
              <svg class="lb-stop-icon hidden size-4 fill-current" xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24">
                <path d="M6 6h12v12H6V6Z" />
              </svg>
            </button>
            <div id="speedControl" class="flex items-center gap-2 pl-2">
              <label for="speedSlider" class="text-sm font-semibold" data-i18n="gameScreen.speed"></label>
              <input id="speedSlider" type="range" min="0.5" max="3.0" step="0.01" value="2"
                class="range range-xs range-primary w-28" />
            </div>
          </div>
        </div>
        <div class="flex flex-col gap-2 min-h-0">
          <div id="instructionsContainer" class="card bg-base-200 shadow">
            <div class="card-body p-3">
              <h2 class="card-title text-base"><span data-i18n="instructions.title"></span></h2>
              <div class="overflow-auto max-h-[220px]">
                <ul class="space-y-0">
                  <li class="lb-instruction">
                    <p class="walk lb-instruction-row">
                      <span class="lb-instruction-label" data-i18n="instructions.walk"></span>
                      <button type="button" class="lb-instruction-delete btn btn-ghost btn-xs btn-square"
                        title="Remove">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="size-4 fill-current">
                          <path
                            d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41Z" />
                        </svg>
                      </button>
                    </p>
                  </li>
                  <li class="lb-instruction">
                    <p class="turnRight lb-instruction-row">
                      <span class="lb-instruction-label" data-i18n="instructions.turnRight"></span>
                      <button type="button" class="lb-instruction-delete btn btn-ghost btn-xs btn-square"
                        title="Remove">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="size-4 fill-current">
                          <path
                            d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41Z" />
                        </svg>
                      </button>
                    </p>
                  </li>
                  <li class="lb-instruction">
                    <p class="turnLeft lb-instruction-row">
                      <span class="lb-instruction-label" data-i18n="instructions.turnLeft"></span>
                      <button type="button" class="lb-instruction-delete btn btn-ghost btn-xs btn-square"
                        title="Remove">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="size-4 fill-current">
                          <path
                            d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41Z" />
                        </svg>
                      </button>
                    </p>
                  </li>
                  <li class="lb-instruction">
                    <p class="jump lb-instruction-row">
                      <span class="lb-instruction-label" data-i18n="instructions.jump"></span>
                      <button type="button" class="lb-instruction-delete btn btn-ghost btn-xs btn-square"
                        title="Remove">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="size-4 fill-current">
                          <path
                            d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41Z" />
                        </svg>
                      </button>
                    </p>
                  </li>
                  <li class="lb-instruction">
                    <p class="light lb-instruction-row">
                      <span class="lb-instruction-label" data-i18n="instructions.light"></span>
                      <button type="button" class="lb-instruction-delete btn btn-ghost btn-xs btn-square"
                        title="Remove">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="size-4 fill-current">
                          <path
                            d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41Z" />
                        </svg>
                      </button>
                    </p>
                  </li>
                  <li class="lb-instruction">
                    <p class="repeat lb-instruction-row">
                      <span class="lb-repeat-left flex items-center gap-2">
                        <span class="lb-instruction-label" data-i18n="instructions.repeat.label"></span>
                        <span class="lb-repeat-count flex items-center gap-2">
                          <input type="number" min="1" max="99" step="1" value="2"
                            class="input input-bordered input-xs w-16" />
                          <span class="text-xs opacity-70" data-i18n="instructions.repeat.times"></span>
                        </span>
                      </span>
                      <button type="button" class="lb-instruction-delete btn btn-ghost btn-xs btn-square"
                        title="Remove">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="size-4 fill-current">
                          <path
                            d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41Z" />
                        </svg>
                      </button>
                    </p>
                    <div class="lb-repeat-body droppable">
                      <div class="lb-repeat-body-inner">
                        <ul class="space-y-2"></ul>
                      </div>
                    </div>
                  </li>
                </ul>
              </div>
            </div>
          </div>
          <div id="programContainer" class="card bg-base-200 shadow flex-1 min-h-0">
            <div class="card-body p-3 min-h-0">
              <h2 class="card-title text-base"><span data-i18n="program.title"></span></h2>
              <div class="droppable flex-1 overflow-x-hidden overflow-y-auto min-h-0">
                <ul class="space-y-0 min-h-[360px]"></ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="credits2" class="absolute bottom-0 inset-x-0 h-4 text-center text-xs opacity-70">
      <div style="float:left;"></div>
      <div style="float:right;"></div>
    </div>
  </div>

  <dialog id="levelCompleteDialog" class="modal">
    <div class="modal-box">
      <h3 class="font-bold text-lg" data-i18n="dialogs.levelComplete.title"></h3>
      <div class="py-4 flex gap-3 items-start">
        <span class="medal shrink-0"></span>
        <div class="flex-1">
          <p class="message" data-i18n="dialogs.levelComplete.message"></p>
          <p class="hint mt-2 text-sm opacity-80"></p>
        </div>
      </div>
      <div class="modal-action">
        <form method="dialog">
          <button class="btn btn-sm">OK</button>
        </form>
      </div>
    </div>
  </dialog>

  <dialog id="achievementDialog" class="modal">
    <div class="modal-box">
      <h3 class="font-bold text-lg" data-i18n="dialogs.achievement.title"></h3>
      <div class="py-4 flex gap-3 items-start">
        <span class="achievement shrink-0"></span>
        <p class="message flex-1"></p>
      </div>
      <div class="modal-action">
        <form method="dialog">
          <button class="btn btn-sm">OK</button>
        </form>
      </div>
    </div>
  </dialog>
</body>

</html>
